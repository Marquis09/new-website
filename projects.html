<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Case Studies Directory - Windows 98 Explorer</title>

<style>
    body {
        margin: 0;
        background: #c0c0c0;
        font-family: "MS Sans Serif", Arial;
    }

    /* FULLSCREEN WINDOW */
    .win98-window {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #c0c0c0;
        border: 2px solid #fff;
        box-shadow: inset -2px -2px #808080, inset 2px 2px #fff;
        display: flex;
        flex-direction: column;
    }

    /* TITLE BAR */
    .titlebar {
        background: #000080;
        color: #fff;
        padding: 3px 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        font-size: 13px;
    }

    .title-left {
        display: flex;
        align-items: center;
    }

    .title-left img {
        width: 16px;
        height: 16px;
        margin-right: 6px;
    }

    .title-buttons button {
        background: #c0c0c0;
        border: 2px solid #fff;
        box-shadow: inset -1px -1px #808080, inset 1px 1px #fff;
        font-size: 12px;
        font-weight: bold;
        width: 24px;
        height: 20px;
        cursor: pointer;
        margin-left: 4px;
    }

    /* MAIN AREA */
    .main-area {
        flex: 1;
        background: #fff;
        border: 2px inset #fff;
        padding: 20px;
        overflow-y: auto;
    }

    /* FOLDER GRID */
    .folder-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 25px;
        margin-top: 20px;
    }

    .folder {
        text-align: center;
        text-decoration: none;
        color: #000;
        cursor: pointer;
    }

    .folder img {
        width: 64px;
        height: 64px;
        image-rendering: pixelated;
        margin-bottom: 8px;
    }

    .folder-title {
        font-size: 14px;
        font-weight: bold;
    }
</style>

<script>
    function closeWindow() {
        window.location.href = "index.html";
    }
</script>

</head>
<body>

<!-- FULLSCREEN WINDOW -->
<div class="win98-window">

    <!-- TITLE BAR -->
    <div class="titlebar">
        <div class="title-left">
            <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png">
            Case Studies Directory
        </div>

        <div class="title-buttons">
            <button onclick="closeWindow()">X</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-area">
        <h2>All Case Studies</h2>
        <p>Below are all UX/UI and development case studies. Click a folder to open the full case study.</p>

        <div class="folder-grid">

            <a class="folder" href="study.html">
                <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png">
                <div class="folder-title">Hartshill Bible Church</div>
            </a>

            <a class="folder" href="studyii.html">
                <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png">
                <div class="folder-title">Project Coward</div>
            </a>

            <a class="folder" href="studyiii.html">
                <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png">
                <div class="folder-title">Munich Travel Guide</div>
            </a>

            <a class="folder" href="studyiv.html">
                <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png">
                <div class="folder-title">Working Class Heroes</div>
            </a>

            <a class="folder" href="studyv.html">
                <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png">
                <div class="folder-title">MMU TV Platform</div>
            </a>

        </div>
    </div>
</div>

</body>
</html>
